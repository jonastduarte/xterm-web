version: '3.8'

services:
  backend:
    image: ghcr.io/jonastduarte/xterm-web/backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-supersecret_xtermweb_clone_key}
      - DB_FILE=/app/data/database.sqlite
      - DATA_DIR=/app/data
    volumes:
      - backend-data:/app/data
      - backend-logs:/app/data/session_logs
    restart: unless-stopped
    networks:
      - xterm-network

  frontend:
    image: ghcr.io/jonastduarte/xterm-web/frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - xterm-network

volumes:
  backend-data:
  backend-logs:

networks:
  xterm-network:
    driver: bridge