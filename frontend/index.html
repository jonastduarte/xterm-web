<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="XTerm Web - Professional web-based SSH, SFTP and FTP client for remote server management" />
    <title>XTerm Web — Remote Connection Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body, html { margin: 0; padding: 0; height: 100%; background-color: #1e1e1e; color: #fff; font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      #root { height: 100%; }
      
      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #666; }
      
      /* Selection */
      ::selection { background: #264f78; color: #fff; }
      
      /* Focus styles */
      input:focus, textarea:focus { border-color: #3498db !important; box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2); }
      
      /* Button hover effects */
      button:hover { opacity: 0.9; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
